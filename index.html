<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SUSTEP</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAdXvTwv1cry2Q2yNZkCgaxpZy04YQw_sw"></script>

<style>
html,body{margin:0;height:100%;font-family:system-ui;background:#f4f7f6}
#map{height:100%;width:100%}

/* ===== POPUP ===== */
.controls{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:16px;

  background:rgba(255,255,255,.96);
  backdrop-filter:blur(12px);
  padding:14px 16px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,.22);
  text-align:center;

  width:92%;
  max-width:320px;
  touch-action:none;
}

.drag-handle{
  width:46px;
  height:5px;
  background:#d1d5db;
  border-radius:999px;
  margin:0 auto 10px;
}

.stats{font-size:14px;margin-bottom:8px;line-height:1.5}
.time{font-size:13px;color:#666}

/* ===== BUTTONS ===== */
button{
  padding:12px 16px;
  margin:4px;
  border:none;
  border-radius:999px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

.start{background:#22c55e;color:white}
.pause{background:#f59e0b;color:white}
.finish{background:#ef4444;color:white}
button:disabled{opacity:.4;cursor:not-allowed}

.btn-row{
  display:flex;
  gap:8px;
}
.btn-row button{flex:1}
.finish{width:100%;margin-top:6px}
</style>
</head>

<body>
<div id="map"></div>

<div class="controls" id="controls">
  <div class="drag-handle"></div>

  <div class="stats">
    ระยะทาง: <b><span id="distance">0.00</span> km</b><br>
    ลดคาร์บอน: <b><span id="carbon">0.000</span> kgCO₂e</b><br>
    <span class="time">เวลา: <span id="time">00:00</span></span>
  </div>

  <div class="btn-row">
    <button id="startBtn" class="start">Start</button>
    <button id="pauseBtn" class="pause">Pause</button>
  </div>
  <button id="finishBtn" class="finish">Finish</button>
</div>

<script>
// ================= CONFIG =================
const EF_CAR = 0.192;

// ================= STATE =================
let map, polyline, userMarker;
let watchId=null;
let totalDistance=0;
let lastPoint=null;
let pathCoords=[];
let startTime=null;
let elapsedBeforePause=0;

let isTracking=false;
let isPaused=false;
let sessionActive=false;

let timerInterval=null;

// ================= MAP =================
function initMap(){
  map=new google.maps.Map(document.getElementById("map"),{
    center:{lat:13.7563,lng:100.5018},
    zoom:16,
    gestureHandling:"greedy"
  });

  polyline=new google.maps.Polyline({
    map,
    path:[],
    strokeColor:"#22c55e",
    strokeWeight:5
  });

  userMarker=new google.maps.Marker({
    map,
    position:{lat:13.7563,lng:100.5018}
  });

  updateButtons();
}
window.onload=initMap;

// ================= UI =================
function updateUI(){
  const km=totalDistance/1000;
  distance.textContent=km.toFixed(2);
  carbon.textContent=(km*EF_CAR).toFixed(3);
}

function updateButtons(){
  startBtn.disabled=sessionActive;
  pauseBtn.disabled=!sessionActive;
  finishBtn.disabled=!sessionActive;
  pauseBtn.textContent=isPaused?"Resume":"Pause";
}

// ================= TIMER =================
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(!startTime) return;
    const diff=Date.now()-startTime;
    const m=Math.floor(diff/60000);
    const s=Math.floor((diff%60000)/1000);
    time.textContent=`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  },1000);
}
function stopTimer(){ clearInterval(timerInterval); }

// ================= DISTANCE =================
function getDistance(p1,p2){
  const R=6371000,toRad=x=>x*Math.PI/180;
  const dLat=toRad(p2.lat-p1.lat);
  const dLon=toRad(p2.lng-p1.lng);
  const a=Math.sin(dLat/2)**2+
    Math.cos(toRad(p1.lat))*Math.cos(toRad(p2.lat))*
    Math.sin(dLon/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ================= GPS (⭐ FIXED PAUSE) =================
function handlePosition(pos){
  const {latitude,longitude,accuracy}=pos.coords;
  if(accuracy>30) return;

  const current={lat:latitude,lng:longitude};

  // ⭐ ถ้า pause หรือไม่ tracking → ไม่เก็บระยะ ไม่ลากเส้น
  if(!isTracking){
    if(userMarker) userMarker.setPosition(current);
    return;
  }

  if(lastPoint){
    const dist=getDistance(lastPoint,current);
    if(dist>60) return;
    totalDistance+=dist;
  }

  lastPoint=current;

  pathCoords.push(current);
  polyline.setPath(pathCoords);

  if(userMarker) userMarker.setPosition(current);
  map.panTo(current);

  updateUI();
}

// ================= START =================
startBtn.onclick=()=>{
  if(!sessionActive){
    resetSession();
    sessionActive=true;
    startTime=new Date();
    startTimer();

    watchId=navigator.geolocation.watchPosition(
      handlePosition,
      err=>console.error(err),
      {enableHighAccuracy:true,maximumAge:1000,timeout:10000}
    );
  }

  isTracking=true;
  isPaused=false;
  updateButtons();
};

// ================= PAUSE / RESUME =================
function pauseTracking(){
  if(isTracking){
    elapsedBeforePause = Date.now()-startTime;
    isTracking=false;
    isPaused=true;
    stopTimer();
  }else if(isPaused){
    isTracking=true;
    isPaused=false;
    startTime=new Date(Date.now()-elapsedBeforePause);
    startTimer();
  }
  updateButtons();
}
pauseBtn.onclick=pauseTracking;

// ================= FINISH =================
finishBtn.onclick=()=>{
  if(!confirm("Finish this walk?")) return;

  isTracking=false;
  isPaused=false;
  stopTimer();

  if(watchId){
    navigator.geolocation.clearWatch(watchId);
    watchId=null;
  }

  resetSession();
  sessionActive=false;
  updateButtons();
};

// ================= RESET =================
function resetSession(){
  totalDistance=0;
  lastPoint=null;
  pathCoords=[];
  startTime=null;
  elapsedBeforePause=0;
  isPaused=false;
  isTracking=false;

  polyline.setPath([]);
  time.textContent="00:00";
  updateUI();
}

// ================= DRAG POPUP =================
const sheet=document.getElementById("controls");
let startY=0,currentY=0,startBottom=16,dragging=false;

sheet.addEventListener("touchstart",e=>{
  dragging=true;
  startY=e.touches[0].clientY;
  startBottom=parseFloat(getComputedStyle(sheet).bottom);
});

sheet.addEventListener("touchmove",e=>{
  if(!dragging) return;
  currentY=e.touches[0].clientY;
  const diff=startY-currentY;
  let next=startBottom+diff;
  next=Math.max(0,Math.min(window.innerHeight*0.6,next));
  sheet.style.bottom=next+"px";
});

sheet.addEventListener("touchend",()=>{
  dragging=false;
  const current=parseFloat(sheet.style.bottom)||0;
  sheet.style.bottom=current>120?"140px":"16px";
});
</script>
</body>
</html>
