<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SUSTEP</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7xnpAUWUrhzQwSQZlfasfGY7ys3WlGOc"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
html,body{
margin:0;height:100%;
font-family:system-ui;
background:#f4f7f6;
}
#map{height:100%;width:100%}

/* CONTROL */
.controls{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:16px;
background:white;
padding:16px;
border-radius:22px;
box-shadow:0 15px 40px rgba(0,0,0,.2);
width:92%;
max-width:340px;
text-align:center;
}

button{
padding:14px;
border:none;
border-radius:999px;
font-weight:600;
display:flex;
justify-content:center;
align-items:center;
gap:6px;
}

.start{background:#22c55e;color:white}
.pause{background:#f59e0b;color:white}
.finish{background:#ef4444;color:white}

.btn-row{
display:flex;
gap:12px;
margin-top:10px;
}
.btn-row button{flex:1}

.finish{width:100%;margin-top:10px}

/* MODAL */
#summaryModal{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
}

.summary-card{
background:white;
padding:28px;
border-radius:28px;
width:85%;
max-width:320px;
text-align:center;
}

/* SUMMARY */
.title{
font-size:18px;
font-weight:600;
margin-bottom:8px;
color:#16a34a;
}

.main{
font-size:42px;
font-weight:700;
}

.time{margin:6px 0}
.carbon{color:#16a34a;margin-bottom:6px}
.date{font-size:13px;color:#999;margin-bottom:18px}

/* ปุ่ม */
.summary-buttons{
display:flex;
gap:14px;
}

.summary-buttons button{
flex:1;
}

.save-btn{background:#22c55e;color:white}
.done-btn{background:#f59e0b;color:white}
</style>
</head>

<body>

<div id="map"></div>

<div class="controls">
<div>
ระยะทาง: <b><span id="distance">0.00</span> km</b><br>
ลด: <b><span id="carbon">0.000</span></b><br>
เวลา: <span id="time">00:00</span>
</div>

<div class="btn-row">
<button id="startBtn" class="start">Start</button>
<button id="pauseBtn" class="pause">Pause</button>
</div>

<button id="finishBtn" class="finish">Finish</button>
</div>

<!-- SUMMARY -->
<div id="summaryModal">
<div class="summary-card" id="captureArea">

<div class="title">Walk Complete 🎉</div>

<div class="main">
<span id="sumDist">0.00</span> km
</div>

<div class="time">เวลา <span id="sumTime">00:00</span></div>

<div class="carbon">
ลด <span id="sumCarbon">0.000</span> kgCO₂e
</div>

<div class="date" id="finishDateTime"></div>

<div class="summary-buttons">
<button onclick="saveImage()" class="save-btn">
<svg width="16" height="16" viewBox="0 0 24 24" fill="white">
<path d="M9 2L7 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3l-2-2H9zm3 5a5 5 0 1 1 0 10 5 5 0 0 1 0-10z"/>
</svg>
Save
</button>

<button onclick="closeSummary()" class="done-btn">Done</button>
</div>

</div>
</div>

<script>
const EF_CAR=0.192;

let map,polyline,userMarker,watchId;
let totalDistance=0,lastPoint=null;
let elapsedSeconds=0,timerInterval;
let isTracking=false;

// MAP
function initMap(){
map=new google.maps.Map(document.getElementById("map"),{
center:{lat:13.7563,lng:100.5018},
zoom:16
});
polyline=new google.maps.Polyline({map,path:[],strokeColor:"#22c55e"});
userMarker=new google.maps.Marker({map});
}
window.onload=initMap;

// TIMER
function startTimer(){
timerInterval=setInterval(()=>{
if(!isTracking) return;
elapsedSeconds++;
updateUI();
},1000);
}

// DISTANCE
function getDistance(p1,p2){
const R=6371000;
const toRad=x=>x*Math.PI/180;
const dLat=toRad(p2.lat-p1.lat);
const dLng=toRad(p2.lng-p1.lng);
const a=Math.sin(dLat/2)**2+
Math.cos(toRad(p1.lat))*Math.cos(toRad(p2.lat))*
Math.sin(dLng/2)**2;
return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// GPS (เสถียรขึ้น)
function handlePosition(pos){
if(!isTracking) return;

const {latitude,longitude,accuracy}=pos.coords;
if(accuracy>20) return; // 🔥 กันเด้ง

const current={lat:latitude,lng:longitude};

if(lastPoint){
const d=getDistance(lastPoint,current);
if(d>2 && d<50) totalDistance+=d; // 🔥 กัน jitter
}

lastPoint=current;
polyline.getPath().push(current);
userMarker.setPosition(current);
map.panTo(current);
updateUI();
}

// UI
function updateUI(){
const km=totalDistance/1000;
distance.textContent=km.toFixed(2);
carbon.textContent=(km*EF_CAR).toFixed(3);

const m=Math.floor(elapsedSeconds/60).toString().padStart(2,"0");
const s=(elapsedSeconds%60).toString().padStart(2,"0");
time.textContent=`${m}:${s}`;
}

// START
startBtn.onclick=()=>{
totalDistance=0;
elapsedSeconds=0;
lastPoint=null;

isTracking=true;
startTimer();

watchId=navigator.geolocation.watchPosition(handlePosition,{
enableHighAccuracy:true
});
};

// FINISH
finishBtn.onclick=()=>{
isTracking=false;
clearInterval(timerInterval);

const km=(totalDistance/1000);
const m=Math.floor(elapsedSeconds/60).toString().padStart(2,"0");
const s=(elapsedSeconds%60).toString().padStart(2,"0");

sumDist.textContent=km.toFixed(2);
sumTime.textContent=`${m}:${s}`;
sumCarbon.textContent=(km*EF_CAR).toFixed(3);

// 🔥 เวลาเหลือแค่ HH:MM
const now=new Date();
const d=String(now.getDate()).padStart(2,'0');
const mo=String(now.getMonth()+1).padStart(2,'0');
const y=now.getFullYear();
const h=String(now.getHours()).padStart(2,'0');
const mi=String(now.getMinutes()).padStart(2,'0');

finishDateTime.textContent=`${d}/${mo}/${y} ${h}:${mi}`;

summaryModal.style.display="flex";

navigator.geolocation.clearWatch(watchId);
};

// SAVE
function saveImage(){
html2canvas(document.querySelector("#captureArea")).then(canvas=>{
const link=document.createElement("a");
link.download="sustep.png";
link.href=canvas.toDataURL();
link.click();
});
}

function closeSummary(){
summaryModal.style.display="none";
}
</script>

</body>
</html>
