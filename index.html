<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SUSTEP</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7xnpAUWUrhzQwSQZlfasfGY7ys3WlGOc"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
html,body{margin:0;height:100%;font-family:system-ui;background:#f4f7f6}
#map{height:100%;width:100%}

.controls{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:16px;
background:rgba(255,255,255,.96);
padding:16px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.22);
text-align:center;
width:92%;
max-width:340px;
}

.stats{font-size:15px;margin-bottom:10px;line-height:1.6}
.time{color:#666}

button{
padding:14px;
border:none;
border-radius:999px;
font-weight:600;
display:flex;
justify-content:center;
align-items:center;
gap:6px;
}

.btn-row{
display:flex;
gap:10px;
margin-top:8px;
}
.btn-row button{flex:1}

.start{background:#22c55e;color:white}
.pause{background:#f59e0b;color:white}
.finish{background:#ef4444;color:white;margin-top:10px}

#summaryModal{
position:fixed;inset:0;background:rgba(0,0,0,.45);
display:none;align-items:center;justify-content:center;
}

.summary-card{
background:white;
padding:28px;
border-radius:28px;
width:85%;
max-width:320px;
text-align:center;
}

.main-metric{font-size:42px;font-weight:700}
.unit{font-size:16px;color:#666}
.time2{margin:8px 0}
.carbon{color:#16a34a}
.date{color:#999;margin:12px 0}
</style>
</head>

<body>

<div id="map"></div>

<div class="controls">
<div class="stats">
<b><span id="distance">0.00</span> km</b><br>
<b><span id="carbon">0.000</span> kgCO₂e</b><br>
<span class="time"><span id="time">00:00</span></span>
</div>

<div class="btn-row">
<button id="startBtn" class="start">Start</button>
<button id="pauseBtn" class="pause">Pause</button>
</div>

<button id="finishBtn" class="finish">Finish</button>
</div>

<div id="summaryModal">
<div class="summary-card">

<div style="font-weight:600;margin-bottom:10px">Walk Complete</div>

<div class="main-metric">
<span id="sumDist">0.00</span><span class="unit"> km</span>
</div>

<div class="time2">เวลา <span id="sumTime">00:00</span></div>
<div class="carbon">ลด <span id="sumCarbon">0.000</span> kgCO₂e</div>
<div class="date" id="finishDateTime">-</div>

<div style="display:flex;gap:10px">
<button onclick="saveImage()" class="start" style="flex:1">
📷 Save
</button>

<button onclick="closeSummary()" class="pause" style="flex:1">
Done
</button>
</div>

</div>
</div>

<script>

const WEBHOOK_URL="https://script.google.com/macros/s/AKfycbz04fVf9Kr5QiJpIuJNdPuec5G7mTOTmbPd0246nE1pGlGq5HNlRR_Hc35gDX_ncovG/exec";
const EF_CAR=0.192;

let map,polyline,watchId;
let totalDistance=0,lastPoint=null,pathCoords=[];
let elapsedSeconds=0,timerInterval;
let isTracking=false,isPaused=false,startTime;

// MAP
function initMap(){
map=new google.maps.Map(document.getElementById("map"),{
center:{lat:13.7563,lng:100.5018},
zoom:16,
streetViewControl:false, // ❌ เอาคนเหลืองออก
mapTypeControl:false
});

polyline=new google.maps.Polyline({
map:map,
path:[],
strokeColor:"#22c55e",
strokeWeight:5
});
}

window.onload=initMap;

// TIMER
function startTimer(){
timerInterval=setInterval(()=>{
if(!isTracking) return;
elapsedSeconds++;
updateUI();
},1000);
}
function stopTimer(){clearInterval(timerInterval);}

// DISTANCE
function getDistance(p1,p2){
const R=6371000;
const toRad=x=>x*Math.PI/180;
const dLat=toRad(p2.lat-p1.lat);
const dLng=toRad(p2.lng-p1.lng);

const a=Math.sin(dLat/2)**2+
Math.cos(toRad(p1.lat))*Math.cos(toRad(p2.lat))*
Math.sin(dLng/2)**2;

return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// GPS
function handlePosition(pos){
if(!isTracking||isPaused) return;

const {latitude,longitude,accuracy}=pos.coords;
if(accuracy>25) return;

const current={lat:latitude,lng:longitude};

if(lastPoint){
const dist=getDistance(lastPoint,current);
if(dist<80) totalDistance+=dist;
}

lastPoint=current;

// ✅ เส้นเขียว (แก้แล้วไม่หาย)
pathCoords.push(current);
polyline.setPath(pathCoords);

map.panTo(current);

updateUI();
}

// UI
function updateUI(){
const km=totalDistance/1000;
distance.textContent=km.toFixed(2);
carbon.textContent=(km*EF_CAR).toFixed(3);

const m=Math.floor(elapsedSeconds/60).toString().padStart(2,"0");
const s=(elapsedSeconds%60).toString().padStart(2,"0");
time.textContent=`${m}:${s}`;
}

// START
startBtn.onclick=()=>{
resetSession();
isTracking=true;
isPaused=false;
startTime=new Date();
startTimer();

watchId=navigator.geolocation.watchPosition(handlePosition,{
enableHighAccuracy:true,
maximumAge:0,
timeout:5000
});
};

// PAUSE
pauseBtn.onclick=()=>{
isPaused=!isPaused;
isTracking=!isPaused;

if(isPaused){
stopTimer();
pauseBtn.textContent="Resume";
}else{
startTimer();
pauseBtn.textContent="Pause";
}
};

// FINISH
finishBtn.onclick=async()=>{
stopTimer();

const endTime=new Date();
const km=(totalDistance/1000);

const m=Math.floor(elapsedSeconds/60).toString().padStart(2,"0");
const s=(elapsedSeconds%60).toString().padStart(2,"0");
const timeText=`${m}:${s}`;

await fetch(WEBHOOK_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },
body:JSON.stringify({
user_email:"test",
user_name:"test",
distance_km:Number(km.toFixed(2)),
duration_text:timeText,
co2_saved_kg:Number((km*EF_CAR).toFixed(3)),
started_at:startTime.toISOString(),
ended_at:endTime.toISOString(),
gps_path:JSON.stringify(pathCoords)
})
});

// UI
sumDist.textContent=km.toFixed(2);
sumTime.textContent=timeText;
sumCarbon.textContent=(km*EF_CAR).toFixed(3);

// เวลา (เหลือ HH:MM)
const d=String(endTime.getDate()).padStart(2,'0');
const mo=String(endTime.getMonth()+1).padStart(2,'0');
const y=endTime.getFullYear();
const h=String(endTime.getHours()).padStart(2,'0');
const mi=String(endTime.getMinutes()).padStart(2,'0');

finishDateTime.textContent=`${d}/${mo}/${y} ${h}:${mi}`;

summaryModal.style.display="flex";

navigator.geolocation.clearWatch(watchId);
};

// SAVE
function saveImage(){
html2canvas(document.querySelector(".summary-card")).then(canvas=>{
const link=document.createElement("a");
link.download="sustep.png";
link.href=canvas.toDataURL();
link.click();
});
}

function closeSummary(){
summaryModal.style.display="none";
}

function resetSession(){
totalDistance=0;
lastPoint=null;
pathCoords=[];
elapsedSeconds=0;
isPaused=false;
isTracking=false;

polyline.setPath([]);
time.textContent="00:00";
updateUI();
}

</script>

</body>
</html>
