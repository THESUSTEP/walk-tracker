<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SUSTEP Walk Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: system-ui;
  }

  #map {
    height: 100%;
    width: 100%;
  }

  .panel {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 20px;
    background: white;
    padding: 16px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,.15);
    text-align: center;
    width: 90%;
    max-width: 420px;
  }

  button {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    margin: 6px;
    font-size: 16px;
  }

  #startBtn { background:#22c55e; color:white; }
  #pauseBtn { background:#eab308; color:white; }
  #finishBtn { background:#ef4444; color:white; }

  /* popup */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.35);
    display: none;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: white;
    padding: 28px;
    border-radius: 20px;
    text-align: center;
    width: 80%;
    max-width: 320px;
  }

  .doneBtn {
    background:#22c55e;
    color:white;
    padding:10px 20px;
    border-radius:999px;
    margin-top:12px;
  }
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <div>ระยะทาง: <b><span id="distance">0.00</span> km</b></div>
  <div>เวลา: <b><span id="time">00:00</span></b></div>
  <div>ลด CO₂: <b><span id="carbon">0.000</span> kg</b></div>

  <button id="startBtn">Start</button>
  <button id="pauseBtn">Pause</button>
  <button id="finishBtn">Finish</button>
</div>

<!-- popup -->
<div id="summaryModal" class="modal">
  <div class="card">
    <h2>🎉 Walk Complete</h2>
    <div><b><span id="sumDist">0.00</span> km</b></div>
    <div>เวลา <b><span id="sumTime">00:00</span></b></div>
    <div>ลด CO₂ <b><span id="sumCarbon">0.000</span> kg</b></div>
    <button class="doneBtn" onclick="summaryModal.style.display='none'">Done</button>
  </div>
</div>

<script>
// =============================
// CONFIG
// =============================
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbzmcdM2jqRyHGdMjtYRlZBFUmDFC0XbuI-PGKdLNP918kvDO_4b5rzaNi7PTa6Ezt5J/exec";
const EF_CAR = 0.192;

// =============================
// DOM
// =============================
const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const finishBtn = document.getElementById("finishBtn");

const summaryModal = document.getElementById("summaryModal");
const sumDist = document.getElementById("sumDist");
const sumTime = document.getElementById("sumTime");
const sumCarbon = document.getElementById("sumCarbon");

// =============================
// STATE
// =============================
let map, polyline, marker;
let watchId = null;

let totalDistance = 0;
let lastPoint = null;
let pathCoords = [];

let elapsedSeconds = 0;
let timerInterval = null;
let startTime = null;

let isTracking = false;
let isPaused = false;
let sessionActive = false;

// =============================
// MAP
// =============================
function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 13.7563, lng: 100.5018 },
    zoom: 16,
    gestureHandling: "greedy"
  });

  polyline = new google.maps.Polyline({
    map,
    path: [],
    strokeColor: "#22c55e",
    strokeWeight: 5
  });

  marker = new google.maps.Marker({
    map,
    position: { lat: 13.7563, lng: 100.5018 }
  });
}

// =============================
// TIMER
// =============================
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!isTracking) return;
    elapsedSeconds++;
    updateUI();
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
}

// =============================
// DISTANCE
// =============================
function getDistance(p1, p2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;

  const dLat = toRad(p2.lat - p1.lat);
  const dLon = toRad(p2.lng - p1.lng);

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(p1.lat)) *
    Math.cos(toRad(p2.lat)) *
    Math.sin(dLon/2)**2;

  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// =============================
// GPS
// =============================
function handlePosition(pos) {
  if (!isTracking || isPaused) return;

  const { latitude, longitude, accuracy } = pos.coords;
  if (accuracy > 30) return;

  const current = { lat: latitude, lng: longitude };

  if (lastPoint) {
    const d = getDistance(lastPoint, current);
    if (d < 60) totalDistance += d;
  }

  lastPoint = current;
  pathCoords.push(current);

  polyline.setPath(pathCoords);
  marker.setPosition(current);
  map.panTo(current);

  updateUI();
}

// =============================
// UI
// =============================
function updateUI() {
  const km = totalDistance / 1000;
  document.getElementById("distance").textContent = km.toFixed(2);
  document.getElementById("carbon").textContent = (km * EF_CAR).toFixed(3);

  const m = String(Math.floor(elapsedSeconds/60)).padStart(2,"0");
  const s = String(elapsedSeconds%60).padStart(2,"0");
  document.getElementById("time").textContent = `${m}:${s}`;
}

// =============================
// START
// =============================
startBtn.onclick = () => {
  if (sessionActive) return;

  sessionActive = true;
  isTracking = true;
  isPaused = false;

  totalDistance = 0;
  elapsedSeconds = 0;
  pathCoords = [];
  lastPoint = null;

  startTime = new Date();
  startTimer();

  watchId = navigator.geolocation.watchPosition(
    handlePosition,
    console.error,
    { enableHighAccuracy:true, maximumAge:1000, timeout:10000 }
  );
};

// =============================
// PAUSE
// =============================
pauseBtn.onclick = () => {
  if (!sessionActive) return;
  isPaused = !isPaused;
  isTracking = !isPaused;

  if (isPaused) stopTimer();
  else startTimer();
};

// =============================
// FINISH
// =============================
finishBtn.onclick = async () => {
  if (!sessionActive) return;

  stopTimer();
  const endTime = new Date();

  const kmDisplay = Number((totalDistance/1000).toFixed(2));

  const m = String(Math.floor(elapsedSeconds/60)).padStart(2,"0");
  const s = String(elapsedSeconds%60).padStart(2,"0");
  const timeText = `${m}:${s}`;

  // send sheet
  try {
    await fetch(WEBHOOK_URL, {
      method:"POST",
      headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify({
        user_email:"test@test.com",
        distance_km: kmDisplay,
        duration_text: timeText,
        co2_saved_kg: Number((kmDisplay*EF_CAR).toFixed(3)),
        started_at: startTime.toISOString(),
        ended_at: endTime.toISOString(),
        gps_path: JSON.stringify(pathCoords)
      })
    });
  } catch(e) {
    console.error(e);
  }

  // popup
  sumDist.textContent = kmDisplay.toFixed(2);
  sumTime.textContent = timeText;
  sumCarbon.textContent = (kmDisplay*EF_CAR).toFixed(3);
  summaryModal.style.display = "flex";

  if (watchId) navigator.geolocation.clearWatch(watchId);

  sessionActive = false;
};
</script>

<!-- ⭐ Google Maps (ต้องอยู่ล่างสุด) -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAdXvTwv1cry2Q2yNZkCgaxpZy04YQw_sw&callback=initMap" async defer></script>

</body>
</html>
